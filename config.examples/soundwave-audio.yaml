# Animation soundwave modulée par le microphone
# Barres verticales réactives à la voix

animation_type: soundwave

position: center

width: 800
height: 100

colors:
  background: [0.0, 0.0, 0.0, 0.0]
  primary: [0.9, 0.2, 0.5, 0.95]      # Rose/magenta
  secondary: [0.5, 0.2, 0.8, 0.9]     # Violet

# Fond arrondi semi-transparent (style capsule)
background:
  enabled: true
  color: [0.2, 0.2, 0.25, 0.85]
  padding: 10

animation:
  fps: 60
  bar_count: 80
  bar_width: 3
  bar_spacing: 2
  intensity: 1.2
  wave_frequency: 2.0

audio:
  enabled: true
  sensitivity: 1.5
  smoothing: 0.3

layer:
  layer: overlay
  exclusive_zone: 0
  margin:
    top: 0
    bottom: 0
    left: 0
    right: 0
