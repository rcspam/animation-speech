# Kurve - Soundwave courbes arc-en-ciel + modulation micro
# Courbes lisses symétriques (en dessous et au-dessus du centre)
# Dégradé 7 couleurs arc-en-ciel style Kurve
# Fond arrondi semi-transparent (cartouche)

animation_type: soundwave-curve
position: bottom

width: 800
height: 80

colors:
  background: [0.0, 0.0, 0.0, 0.0]
  primary: [1.0, 0.0, 0.3, 0.9]
  secondary: [0.5, 0.0, 1.0, 0.9]
  gradient:
    - [1.0, 0.0, 0.3, 0.9]     # Rouge/rose
    - [1.0, 0.8, 0.0, 0.9]     # Jaune/or
    - [0.0, 0.9, 0.3, 0.9]     # Vert
    - [0.0, 0.8, 1.0, 0.9]     # Cyan
    - [0.3, 0.4, 1.0, 0.9]     # Bleu
    - [0.7, 0.2, 1.0, 0.9]     # Violet
    - [1.0, 0.3, 0.7, 0.9]     # Magenta

# Fond arrondi semi-transparent (style capsule)
background:
  enabled: true
  color: [0.2, 0.2, 0.25, 0.85]   # Gris foncé semi-transparent
  padding: 10                       # Marge entre cartouche et bord fenêtre

animation:
  fps: 60
  intensity: 0.9
  wave_frequency: 2.5
  wave_count: 1
  fill_opacity: 0.3

# Capture audio du microphone
audio:
  enabled: true
  sensitivity: 1.5
  smoothing: 0.3

signals:
  start: SIGUSR1
  stop: SIGUSR2

layer:
  layer: overlay
  exclusive_zone: 0
  margin:
    top: 0
    bottom: 0
    left: 0
    right: 0
