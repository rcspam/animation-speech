# Kurve - Wave Catppuccin Macchiato + modulation micro
# Courbe unique Catppuccin 7 couleurs avec remplissage

animation_type: wave
position: bottom

width: 800
height: 60

colors:
  background: [0.0, 0.0, 0.0, 0.0]
  primary: [0.93, 0.53, 0.59, 0.9]
  secondary: [0.55, 0.84, 0.79, 0.9]
  gradient:
    - [0.93, 0.53, 0.59, 0.9]    # Red #ED8796
    - [0.93, 0.83, 0.62, 0.9]    # Yellow #EED49F
    - [0.65, 0.85, 0.58, 0.9]    # Green #A6DA95
    - [0.55, 0.84, 0.79, 0.9]    # Teal #8BD5CA
    - [0.54, 0.68, 0.96, 0.9]    # Blue #8AADF4
    - [0.96, 0.74, 0.90, 0.9]    # Pink #F5BDE6
    - [0.96, 0.66, 0.50, 0.9]    # Peach #f5a97f

# Fond arrondi semi-transparent (style capsule)
background:
  enabled: true
  color: [0.2, 0.2, 0.25, 0.85]
  padding: 10

animation:
  fps: 60
  smoothing: 0.4
  intensity: 0.8
  wave_frequency: 3.0
  wave_count: 1
  fill_wave: true
  fill_opacity: 0.3

# Capture audio du microphone
audio:
  enabled: true
  sensitivity: 1.5
  smoothing: 0.3

signals:
  start: SIGUSR1
  stop: SIGUSR2

layer:
  layer: overlay
  exclusive_zone: 0
  margin:
    top: 0
    bottom: 0
    left: 0
    right: 0
