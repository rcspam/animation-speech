# Kurve - Barres radiales arc-en-ciel + modulation micro (style circ_0005)
# Barres émanant d'un cercle central avec dégradé rainbow

animation_type: circular-bars
position: center

width: 200
height: 200

colors:
  background: [0.0, 0.0, 0.0, 0.0]
  primary: [1.0, 0.0, 0.3, 0.9]
  secondary: [0.5, 0.0, 1.0, 0.9]
  gradient:
    - [1.0, 0.0, 0.3, 0.9]       # Rouge/rose
    - [1.0, 0.8, 0.0, 0.9]       # Jaune/or
    - [0.0, 0.9, 0.3, 0.9]       # Vert
    - [0.0, 0.8, 1.0, 0.9]       # Cyan
    - [0.3, 0.4, 1.0, 0.9]       # Bleu
    - [0.7, 0.2, 1.0, 0.9]       # Violet
    - [1.0, 0.3, 0.7, 0.9]       # Magenta

# Fond arrondi semi-transparent (style capsule)
background:
  enabled: true
  color: [0.2, 0.2, 0.25, 0.85]
  padding: 10

animation:
  fps: 60
  bar_count: 80
  bar_width: 3
  intensity: 0.9
  wave_frequency: 2.5

# Capture audio du microphone
audio:
  enabled: true
  sensitivity: 1.5
  smoothing: 0.3

signals:
  start: SIGUSR1
  stop: SIGUSR2

layer:
  layer: overlay
  exclusive_zone: 0
  margin:
    top: 0
    bottom: 0
    left: 0
    right: 0
