# Kurve - Style par défaut + modulation micro
# Courbe unique avec dégradé arc-en-ciel et remplissage sous la courbe

animation_type: wave
position: bottom

width: 800
height: 60

colors:
  background: [0.0, 0.0, 0.0, 0.0]
  primary: [1.0, 0.0, 0.3, 0.9]
  secondary: [0.5, 0.0, 1.0, 0.9]
  gradient:
    - [1.0, 0.0, 0.3, 0.9]     # Rouge/rose
    - [1.0, 0.8, 0.0, 0.9]     # Jaune/or
    - [0.0, 0.9, 0.3, 0.9]     # Vert
    - [0.0, 0.8, 1.0, 0.9]     # Cyan
    - [0.3, 0.4, 1.0, 0.9]     # Bleu
    - [0.7, 0.2, 1.0, 0.9]     # Violet
    - [1.0, 0.3, 0.7, 0.9]     # Magenta

# Fond arrondi semi-transparent (style capsule)
background:
  enabled: true
  color: [0.2, 0.2, 0.25, 0.85]
  padding: 10

animation:
  fps: 60
  smoothing: 0.4
  intensity: 0.8
  wave_frequency: 3.0
  wave_count: 1
  fill_wave: true
  fill_opacity: 0.3

# Capture audio du microphone
audio:
  enabled: true
  sensitivity: 1.5
  smoothing: 0.3

signals:
  start: SIGUSR1
  stop: SIGUSR2

layer:
  layer: overlay
  exclusive_zone: 0
  margin:
    top: 0
    bottom: 0
    left: 0
    right: 0
