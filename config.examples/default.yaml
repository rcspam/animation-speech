# Kurve - Soundwave Catppuccin Macchiato + modulation micro
# Barres centrées verticalement avec dégradé 7 couleurs Catppuccin

animation_type: soundwave
position: bottom

width: 800
height: 80

colors:
  background: [0.0, 0.0, 0.0, 0.0]
  primary: [0.93, 0.53, 0.59, 0.95]
  secondary: [0.96, 0.66, 0.50, 0.95]
  gradient:
    - [0.93, 0.53, 0.59, 0.95]   # Red #ED8796
    - [0.93, 0.83, 0.62, 0.95]   # Yellow #EED49F
    - [0.65, 0.85, 0.58, 0.95]   # Green #A6DA95
    - [0.55, 0.84, 0.79, 0.95]   # Teal #8BD5CA
    - [0.54, 0.68, 0.96, 0.95]   # Blue #8AADF4
    - [0.96, 0.74, 0.90, 0.95]   # Pink #F5BDE6
    - [0.96, 0.66, 0.50, 0.95]   # Peach #f5a97f

# Fond arrondi semi-transparent (style capsule)
background:
  enabled: true
  color: [0.2, 0.2, 0.25, 0.85]
  padding: 10

animation:
  fps: 60
  bar_count: 50
  bar_width: 4
  bar_spacing: 4
  intensity: 0.9
  wave_frequency: 2.5

# Capture audio du microphone
audio:
  enabled: true
  sensitivity: 1.5
  smoothing: 0.3

signals:
  start: SIGUSR1
  stop: SIGUSR2

layer:
  layer: overlay
  exclusive_zone: 0
  margin:
    top: 0
    bottom: 0
    left: 0
    right: 0
